name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Firebase secrets
        run: |
          test -n "${{ secrets.FIREBASE_API_KEY }}" || (echo "Falta FIREBASE_API_KEY" && exit 1)
          test -n "${{ secrets.FIREBASE_AUTH_DOMAIN }}" || (echo "Falta FIREBASE_AUTH_DOMAIN" && exit 1)
          test -n "${{ secrets.FIREBASE_PROJECT_ID }}" || (echo "Falta FIREBASE_PROJECT_ID" && exit 1)
          test -n "${{ secrets.FIREBASE_APP_ID }}" || (echo "Falta FIREBASE_APP_ID" && exit 1)
          test -n "${{ secrets.FIREBASE_DATABASE_URL }}" || (echo "Falta FIREBASE_DATABASE_URL" && exit 1)

      - name: Generate Firebase config
        run: |
          cat > firebase-config.js <<'EOF'
          window.THE_VAULT_FIREBASE_CONFIG = {
            apiKey: '${{ secrets.FIREBASE_API_KEY }}',
            authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
            appId: '${{ secrets.FIREBASE_APP_ID }}',
            databaseURL: '${{ secrets.FIREBASE_DATABASE_URL }}'
          };
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4