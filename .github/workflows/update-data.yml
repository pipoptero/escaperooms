name: Actualizar datos desde Excel

on:
  push:
    paths:
      - "**.xlsx"
      - "**.xls"
      - "convert.py"
      - "scripts/build_review_photos.py"
      - "images/Hechos/**"

jobs:
  convert-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install openpyxl

      - name: Convertir Excel y fotos de reviews
        run: |
          python convert.py
          python scripts/build_review_photos.py

      - name: Commit y push data.json y review_photos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json review_photos.json
          git diff --staged --quiet && echo "Sin cambios en data.json ni review_photos.json" || (
            git commit -m "Auto-update data.json y review_photos.json"
            git push
          )
